name: Build APK

on:
  workflow_dispatch:
    inputs:
      release_channel:
        description: "Build channel (beta for internal testing, contact for stable operator channel, prod for official release)"
        required: false
        default: "beta"
        type: choice
        options:
          - beta
          - contact
          - prod

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "21"

      - name: Install npm dependencies
        run: npm ci --ignore-scripts || npm install

      - name: Build Vue frontend
        run: npm run build:frontend

      - name: Build CLI server
        run: npm run build:cli

      - name: Bundle server into APK assets
        run: bash android/scripts/build-server-bundle.sh

      - name: Download Termux bootstrap
        run: bash android/scripts/download-bootstrap.sh

      - name: Download offline OpenClaw runtime assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p android/app/src/main/assets/runtime
          # Keep bundled runtime files committed in repo (e.g. Ubuntu rootfs/proot).
          # Only refresh OpenClaw-specific blobs downloaded from release.
          rm -f android/app/src/main/assets/runtime/openclaw-runtime-2026.3.2.tar
          rm -f android/app/src/main/assets/runtime/openclaw_installed_2026_3_2.tar.gz
          rm -f android/app/src/main/assets/runtime/davey.android-arm64.node
          gh release download runtime-assets-2026-03-19-r1 \
            --repo "${{ github.repository }}" \
            --pattern "openclaw_installed_2026_3_2.tar.gz" \
            --pattern "davey.android-arm64.node" \
            --dir android/app/src/main/assets/runtime
          mv android/app/src/main/assets/runtime/openclaw_installed_2026_3_2.tar.gz \
            android/app/src/main/assets/runtime/openclaw-runtime-2026.3.2.tar
          ls -lh android/app/src/main/assets/runtime

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Prepare fixed signing keystore
        run: |
          if [ -z "${{ secrets.ANYCLAW_SIGNING_STORE_BASE64 }}" ]; then
            echo "Missing repository secret ANYCLAW_SIGNING_STORE_BASE64"
            exit 1
          fi
          if [ -z "${{ secrets.ANYCLAW_SIGNING_STORE_PASSWORD }}" ]; then
            echo "Missing repository secret ANYCLAW_SIGNING_STORE_PASSWORD"
            exit 1
          fi
          if [ -z "${{ secrets.ANYCLAW_SIGNING_KEY_ALIAS }}" ]; then
            echo "Missing repository secret ANYCLAW_SIGNING_KEY_ALIAS"
            exit 1
          fi
          if [ -z "${{ secrets.ANYCLAW_SIGNING_KEY_PASSWORD }}" ]; then
            echo "Missing repository secret ANYCLAW_SIGNING_KEY_PASSWORD"
            exit 1
          fi
          mkdir -p android/signing
          echo "${{ secrets.ANYCLAW_SIGNING_STORE_BASE64 }}" | base64 -d > android/signing/pocket-lobster-release.p12

      - name: Build channel APK
        id: build_apk
        working-directory: android
        env:
          ANYCLAW_SIGNING_STORE_FILE: ${{ github.workspace }}/android/signing/pocket-lobster-release.p12
          ANYCLAW_SIGNING_STORE_PASSWORD: ${{ secrets.ANYCLAW_SIGNING_STORE_PASSWORD }}
          ANYCLAW_SIGNING_KEY_ALIAS: ${{ secrets.ANYCLAW_SIGNING_KEY_ALIAS }}
          ANYCLAW_SIGNING_KEY_PASSWORD: ${{ secrets.ANYCLAW_SIGNING_KEY_PASSWORD }}
          BUILD_CHANNEL: ${{ github.event.inputs.release_channel || 'beta' }}
        run: |
          CHANNEL="${BUILD_CHANNEL:-beta}"
          if [ "$CHANNEL" = "prod" ]; then
            ./gradlew assembleProdDebug
            APK_SOURCE="app/build/outputs/apk/prod/debug/app-prod-debug.apk"
            APK_NAME="pocket-lobster.apk"
            PACKAGE_ID="com.codex.mobile.pocketlobster"
          elif [ "$CHANNEL" = "contact" ]; then
            ./gradlew assembleContactDebug
            APK_SOURCE="app/build/outputs/apk/contact/debug/app-contact-debug.apk"
            APK_NAME="pocket-lobster-contact.apk"
            PACKAGE_ID="com.codex.mobile.pocketlobster.test"
            CHANNEL="contact"
          else
            ./gradlew assembleBetaDebug
            APK_SOURCE="app/build/outputs/apk/beta/debug/app-beta-debug.apk"
            APK_NAME="pocket-lobster-beta.apk"
            PACKAGE_ID="com.codex.mobile.pocketlobster.beta"
            CHANNEL="beta"
          fi
          if [ ! -f "$APK_SOURCE" ]; then
            echo "APK not found: $APK_SOURCE"
            exit 1
          fi
          mkdir -p app/build/outputs/apk/debug
          cp "$APK_SOURCE" "app/build/outputs/apk/debug/$APK_NAME"
          echo "apk_name=$APK_NAME" >> "$GITHUB_OUTPUT"
          echo "release_channel=$CHANNEL" >> "$GITHUB_OUTPUT"
          echo "package_id=$PACKAGE_ID" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: pocket-lobster-${{ steps.build_apk.outputs.release_channel }}
          path: android/app/build/outputs/apk/debug/${{ steps.build_apk.outputs.apk_name }}

      - name: Generate changelog
        if: github.ref_type == 'branch'
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | head -1)
          if [ -n "$PREV_TAG" ]; then
            CHANGES=$(git log "$PREV_TAG"..HEAD --pretty=format:"- %s" --reverse)
          else
            CHANGES=$(git log --pretty=format:"- %s" --reverse -20)
          fi
          {
            echo "notes<<CHANGELOG_EOF"
            echo "$CHANGES"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create Release
        if: github.ref_type == 'branch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}-${{ steps.build_apk.outputs.release_channel }}
          name: "Pocket Lobster ${{ steps.build_apk.outputs.release_channel }} v${{ github.run_number }} (${{ github.ref_name }})"
          body: |
            🦞 **Pocket Lobster** — OpenClaw + Codex on Android

            📱 Install the APK on any ARM64 Android 7.0+ device. No root required.

            ### Changes
            ${{ steps.changelog.outputs.notes }}

            ---
            Channel: ${{ steps.build_apk.outputs.release_channel }}
            Package ID: ${{ steps.build_apk.outputs.package_id }}
            Branch: ${{ github.ref_name }}
            Built from commit ${{ github.sha }}
          files: android/app/build/outputs/apk/debug/${{ steps.build_apk.outputs.apk_name }}
          draft: false
          prerelease: ${{ steps.build_apk.outputs.release_channel != 'prod' }}
