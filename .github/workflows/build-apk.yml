name: Build APK

on:
  workflow_dispatch:
  push:
    branches:
      - feat/stage1-upstream-fusion

permissions:
  contents: read

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build third-party debug APK
        working-directory: apps/android
        run: ./gradlew :app:assembleThirdPartyDebug --no-daemon

      - name: Collect APK
        run: |
          mkdir -p out
          cp apps/android/app/build/outputs/apk/thirdParty/debug/*.apk out/pocket-lobster-stage1.apk

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pocket-lobster-stage1
          path: out/pocket-lobster-stage1.apk
